<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XAUUSD 30-Day Challenge</title>
    <meta name="description" content="Premium trading journal for the 30-Day XAUUSD $100 Challenge.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Background Canvas -->
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb--gold"></div>
    <div class="bg-orb bg-orb--purple"></div>

    <div id="app">

        <!-- ─── HEADER ─── -->
        <header id="header">
            <div class="header-left">
                <div class="logo-mark">
                    <span class="logo-icon">◆</span>
                </div>
                <div>
                    <h1 class="logo-text">XAU<span class="accent">USD</span></h1>
                    <span class="header-tag">30-DAY CHALLENGE</span>
                </div>
            </div>
            <button id="resetBtn" class="reset-btn" title="Reset all data">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
            </button>
        </header>

        <!-- ─── ANALYTICS DASHBOARD ─── -->
        <section id="analytics" class="analytics">
            <div class="analytics-grid">
                <!-- Progress Donut -->
                <div class="a-card a-card--progress">
                    <svg class="donut" viewBox="0 0 36 36">
                        <circle cx="18" cy="18" r="15.9" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="2.8"/>
                        <circle id="donutCircle" cx="18" cy="18" r="15.9" fill="none" stroke="url(#goldGrad)" stroke-width="2.8" stroke-dasharray="0 100" stroke-linecap="round" transform="rotate(-90 18 18)"/>
                        <defs><linearGradient id="goldGrad"><stop offset="0%" stop-color="#d4af37"/><stop offset="100%" stop-color="#f0d060"/></linearGradient></defs>
                    </svg>
                    <div class="donut-center">
                        <span id="pctText" class="donut-pct">0%</span>
                        <span class="donut-sub">Progress</span>
                    </div>
                </div>

                <!-- Stat Cards -->
                <div class="a-card a-stat">
                    <span class="a-stat-val" id="statDone">0</span>
                    <span class="a-stat-label">Completed</span>
                    <div class="a-stat-bar"><div id="barDone" class="a-stat-fill a-stat-fill--gold"></div></div>
                </div>
                <div class="a-card a-stat">
                    <span class="a-stat-val" id="statLeft">30</span>
                    <span class="a-stat-label">Remaining</span>
                    <div class="a-stat-bar"><div id="barLeft" class="a-stat-fill a-stat-fill--dim"></div></div>
                </div>
                <div class="a-card a-stat">
                    <span class="a-stat-val accent" id="statBal">$100</span>
                    <span class="a-stat-label">Current Balance</span>
                    <div class="a-stat-bar"><div id="barBal" class="a-stat-fill a-stat-fill--green"></div></div>
                </div>
                <div class="a-card a-stat">
                    <span class="a-stat-val" id="statProfit">$0.00</span>
                    <span class="a-stat-label">Total Profit</span>
                    <div class="a-stat-bar"><div id="barProfit" class="a-stat-fill a-stat-fill--gold"></div></div>
                </div>
                <div class="a-card a-stat">
                    <span class="a-stat-val" id="statStreak">0</span>
                    <span class="a-stat-label">Day Streak 🔥</span>
                    <div class="a-stat-bar"><div id="barStreak" class="a-stat-fill a-stat-fill--orange"></div></div>
                </div>
            </div>
        </section>

        <!-- ─── JOURNAL DAYS ─── -->
        <section id="journal">
            <div class="section-head">
                <h2 class="section-title">Daily Journal</h2>
                <span class="section-badge" id="badgeCount">0 / 30</span>
            </div>
            <div class="days-list" id="daysList"></div>
        </section>

        <footer>
            <p>Built for Disciplined Traders &bull; XAUUSD Journal</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
